name: Check - Consensus Spec Values

on:
  pull_request:
  push:
    branches:
      - master
  schedule:
    - cron: '0 8 * * *'

permissions:
  contents: read

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Docker image
        run: docker build -t ethereum-genesis-generator:ci-test .

      - name: Export image
        run: docker save ethereum-genesis-generator:ci-test | gzip > /tmp/image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docker-image
          path: /tmp/image.tar.gz
          retention-days: 1

  check-genesis-output:
    name: Check consensus spec values (${{ matrix.preset }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        preset: [mainnet, minimal]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download image artifact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load < /tmp/image.tar.gz

      - name: Run genesis (${{ matrix.preset }})
        run: |
          mkdir -p output
          docker run --rm -u "$(id -u):$(id -g)" \
            -v "$PWD/output:/data" \
            -v "$PWD/test/test-cases/${{ matrix.preset }}-spec-check.env:/config/values.env" \
            ethereum-genesis-generator:ci-test all

      - name: Install pyyaml
        run: pip install pyyaml --quiet

      - name: Download upstream consensus-specs config
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/ethereum/consensus-specs/master/configs/${{ matrix.preset }}.yaml" \
            -o /tmp/spec-${{ matrix.preset }}.yaml

      - name: Compare genesis output config against upstream spec
        run: |
          python3 .github/check-consensus-spec-values.py \
            --our-config output/metadata/config.yaml \
            --spec-config /tmp/spec-${{ matrix.preset }}.yaml
